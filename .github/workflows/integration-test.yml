name: Integration Test

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'CODE_OF_CONDUCT*.md'
      - 'LICENSE*'
      - 'NOTICE*.md'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'CODE_OF_CONDUCT*.md'
      - 'LICENSE*'
      - 'NOTICE*.md'
  workflow_dispatch:

concurrency:
  group: local-ai-hub-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  migration_test:
    name: Run Migration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: venv

      - name: Activate virtualenv
        run: |
          . venv/bin/activate
          echo PATH=$PATH >> $GITHUB_ENV

      - name: Install dependencies
        run: uv pip install -r backend/requirements.txt

      - name: Check Alembic Schema Drift
        env:
          WEBUI_SECRET_KEY: secret-key
          GLOBAL_LOG_LEVEL: debug
          ENABLE_DB_MIGRATIONS: "False"
        run: |
          cd backend/open_webui
          alembic -c alembic.ini upgrade head
          if ! alembic -c alembic.ini check; then
            echo "::warning::Alembic schema drift detected; continuing while migration parity is being reconciled."
          fi

      - name: Test backend with SQLite
        id: sqlite
        env:
          WEBUI_SECRET_KEY: secret-key
          GLOBAL_LOG_LEVEL: debug
        run: |
          cd backend
          uvicorn open_webui.main:app --port "8080" --forwarded-allow-ips '*' &
          UVICORN_PID=$!
          for i in {1..40}; do
              curl -s http://localhost:8080/api/config > /dev/null && break
              sleep 1
              if [ $i -eq 40 ]; then
                  echo "Server failed to start"
                  kill -9 $UVICORN_PID
                  exit 1
              fi
          done
          sleep 5
          if ! kill -0 $UVICORN_PID; then
              echo "Server has stopped"
              exit 1
          fi

      - name: Test backend with Postgres
        if: success() || steps.sqlite.conclusion == 'failure'
        env:
          WEBUI_SECRET_KEY: secret-key
          GLOBAL_LOG_LEVEL: debug
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          DATABASE_POOL_SIZE: 10
          DATABASE_POOL_MAX_OVERFLOW: 10
          DATABASE_POOL_TIMEOUT: 30
        run: |
          cd backend
          uvicorn open_webui.main:app --port "8081" --forwarded-allow-ips '*' &
          UVICORN_PID=$!
          for i in {1..120}; do
              curl -s http://localhost:8081/api/config > /dev/null && break
              sleep 1
              if [ $i -eq 120 ]; then
                  echo "Server failed to start"
                  kill -9 $UVICORN_PID
                  exit 1
              fi
          done
          sleep 5
          if ! kill -0 $UVICORN_PID; then
              echo "Server has stopped"
              exit 1
          fi

          status_code=$(curl --write-out %{http_code} -s --output /dev/null http://localhost:8081/health/db)
          if [[ "$status_code" -ne 200 ]] ; then
            echo "Server has failed before postgres reconnect check"
            exit 1
          fi

          echo "Terminating all connections to postgres..."
          "${GITHUB_WORKSPACE}/venv/bin/python" -c "import os, psycopg2 as pg2; \
            conn = pg2.connect(dsn=os.environ['DATABASE_URL'].replace('+pool', '')); \
            cur = conn.cursor(); \
            cur.execute('SELECT pg_terminate_backend(psa.pid) FROM pg_stat_activity psa WHERE datname = current_database() AND pid <> pg_backend_pid();')"

          status_code=$(curl --write-out %{http_code} -s --output /dev/null http://localhost:8081/health/db)
          if [[ "$status_code" -ne 200 ]] ; then
            echo "Server has not reconnected to postgres after connection was closed: returned status $status_code"
            exit 1
          fi

  backend_pytest_fast:
    name: Run Backend Pytest (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: migration_test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: venv

      - name: Activate virtualenv
        run: |
          . venv/bin/activate
          echo PATH=$PATH >> $GITHUB_ENV

      - name: Install backend test dependencies
        run: |
          uv pip install -r backend/requirements.txt
          uv pip install moto gcp-storage-emulator

      - name: Run backend fast pytest
        env:
          WEBUI_SECRET_KEY: secret-key
          GLOBAL_LOG_LEVEL: debug
        run: |
          cd backend
          PYTHONPATH=. pytest open_webui/test -q -m "fast and not slow" --maxfail=1 --durations=20 --junitxml=pytest-fast-report.xml

      - name: Upload backend fast pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-fast-report
          path: backend/pytest-fast-report.xml
          if-no-files-found: warn

  backend_pytest_integration:
    name: Run Backend Pytest (Integration)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - migration_test
      - backend_pytest_fast
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: venv

      - name: Activate virtualenv
        run: |
          . venv/bin/activate
          echo PATH=$PATH >> $GITHUB_ENV

      - name: Install backend integration test dependencies
        run: |
          uv pip install -r backend/requirements.txt
          uv pip install moto gcp-storage-emulator

      - name: Run backend integration pytest
        env:
          WEBUI_SECRET_KEY: secret-key
          GLOBAL_LOG_LEVEL: debug
        run: |
          cd backend
          PYTHONPATH=. pytest open_webui/test -q -m "integration" --maxfail=1 --durations=20 --junitxml=pytest-integration-report.xml

      - name: Upload backend integration pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-integration-report
          path: backend/pytest-integration-report.xml
          if-no-files-found: warn

  backend_contract_tests:
    name: Run Backend Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - migration_test
      - backend_pytest_fast
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: venv

      - name: Activate virtualenv
        run: |
          . venv/bin/activate
          echo PATH=$PATH >> $GITHUB_ENV

      - name: Install backend contract test dependencies
        run: |
          uv pip install -r backend/requirements.txt
          uv pip install moto gcp-storage-emulator

      - name: Run backend contract pytest
        env:
          WEBUI_SECRET_KEY: secret-key
          GLOBAL_LOG_LEVEL: debug
        run: |
          cd backend
          PYTHONPATH=. pytest open_webui/test/apps/webui/routers/test_contracts.py -q --junitxml=pytest-contract-report.xml

      - name: Upload backend contract pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-contract-report
          path: backend/pytest-contract-report.xml
          if-no-files-found: warn

  frontend_tests:
    name: Run Frontend Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: migration_test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci --force

      - name: Run vitest with coverage
        run: npm run test:frontend:coverage

      - name: Validate frontend coverage gate
        run: |
          node -e "const fs=require('fs');const p='coverage/coverage-summary.json';if(!fs.existsSync(p)){console.log('::warning::coverage summary missing; skipping frontend coverage gate for this run');process.exit(0)}const s=JSON.parse(fs.readFileSync(p,'utf8'));const lines=s.total.lines.pct||0;if(lines<20){throw new Error('Frontend coverage below 20% gate: '+lines)}console.log('Frontend lines coverage:',lines)"

      - name: Upload frontend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage
          if-no-files-found: warn

  security_scan:
    name: Dependency & SAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    needs: migration_test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit
          npm ci --force

      - name: Run backend dependency audit
        run: |
          set +e
          pip-audit -r backend/requirements.txt --progress-spinner off | tee pip-audit-report.txt
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::pip-audit detected vulnerabilities; continuing and uploading report."
          fi

      - name: Run backend bandit scan
        run: |
          if ! bandit -r backend/open_webui -x backend/open_webui/test -f txt -o bandit-report.txt; then
            echo "::warning::bandit reported findings; continuing and uploading report."
          fi

      - name: Run frontend npm audit
        run: |
          set +e
          npm audit --audit-level=high --json | tee npm-audit-report.json
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::npm audit reported vulnerabilities; continuing and uploading report."
          fi

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: |
            bandit-report.txt
            pip-audit-report.txt
            npm-audit-report.json
          if-no-files-found: ignore

  cypress-run:
    name: Run Cypress Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: shard-1
            specs: cypress/e2e/chat.cy.ts,cypress/e2e/documents.cy.ts
          - shard: shard-2
            specs: cypress/e2e/registration.cy.ts,cypress/e2e/settings.cy.ts
    needs:
      - migration_test
      - backend_pytest_fast
      - backend_pytest_integration
      - backend_contract_tests
      - frontend_tests
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Build and run Compose Stack
        run: |
          docker compose \
            --file docker-compose.yaml \
            --file docker-compose.api.yaml \
            --file docker-compose.a1111-test.yaml \
            up --detach --build

      - name: Delete Docker build cache
        run: docker builder prune --all --force

      - name: Wait for Ollama to be up
        timeout-minutes: 5
        run: |
          until curl --output /dev/null --silent --fail http://localhost:11434; do
            printf '.'
            sleep 1
          done
          echo "Service is up!"

      - name: Preload Ollama model
        timeout-minutes: 10
        run: |
          set -euo pipefail
          model="qwen:0.5b-chat-v1.5-q2_K"
          for attempt in 1 2 3 4 5; do
            echo "Pulling $model (attempt $attempt/5)..."
            if docker exec ollama ollama pull "$model"; then
              echo "Model pull succeeded."
              exit 0
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep_seconds=$((attempt * 5))
              echo "Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::Failed to pull $model after 5 attempts."
          exit 1

      - name: Cypress run (${{ matrix.shard }})
        uses: cypress-io/github-action@v6
        env:
          LIBGL_ALWAYS_SOFTWARE: 1
        with:
          browser: chrome
          wait-on: "http://localhost:3000"
          config: baseUrl=http://localhost:3000
          spec: ${{ matrix.specs }}

      - name: Upload Cypress videos (${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ matrix.shard }}
          path: cypress/videos
          if-no-files-found: ignore

      - name: Upload Cypress screenshots (${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.shard }}
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Extract Compose logs (${{ matrix.shard }})
        if: always()
        run: docker compose logs > compose-logs.txt

      - name: Upload Compose logs (${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs-${{ matrix.shard }}
          path: compose-logs.txt
          if-no-files-found: ignore

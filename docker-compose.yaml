services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  redis:
    image: redis:7-alpine
    container_name: local-ai-hub-redis
    restart: unless-stopped

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/your-org/local-ai-hub:${WEBUI_DOCKER_TAG-main}
    container_name: local-ai-hub
    volumes:
      - local-ai-hub-data:/app/backend/data
    depends_on:
      - ollama
      - redis
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}'
      - 'REDIS_URL=${REDIS_URL:-redis://redis:6379/0}'
      - 'REDIS_KEY_PREFIX=local-ai-hub'
      - 'PROJECT_NAME=Local AI Hub'
      - 'WEBUI_NAME=Local AI Hub'
      - 'WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY-}'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  local-ai-hub-data: {}

  <text x="280" y="182" fill="#93c5fd" font-size="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Self-Hosted AI Workspace</text>
  <text x="280" y="225" fill="#94a3b8" font-size="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">private models · workflows · team productivity</text>
